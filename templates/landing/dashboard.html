<!-- QUICK DASHBOARD SECTION -->
<section class="dashboard-section" id="live-dashboard">
  <h2 class="dashboard-title">Dashboard realtime</h2>
  <p class="dashboard-subtitle">Theo dõi nhanh tình trạng AI và dữ liệu hệ thống từ API thật.</p>
  <div class="dashboard-grid">
    <div class="dash-card">
      <div class="dash-label">AI Overall</div>
      <div class="dash-value" id="dash-ai-ready">--</div>
      <span class="dash-chip" id="dash-ai-chip">checking...</span>
    </div>
    <div class="dash-card">
      <div class="dash-label">Vector Search</div>
      <div class="dash-value" id="dash-vector-count">--</div>
      <span class="dash-chip" id="dash-vector-chip">checking...</span>
    </div>
    <div class="dash-card">
      <div class="dash-label">AI Models Loaded</div>
      <div class="dash-value" id="dash-model-count">--</div>
      <span class="dash-chip ok" id="dash-model-chip">model count</span>
    </div>
    <div class="dash-card">
      <div class="dash-label">Data Source</div>
      <div class="dash-value" id="dash-data-source">--</div>
      <span class="dash-chip ok" id="dash-orders-chip">orders: --</span>
    </div>
    <div class="dash-card">
      <div class="dash-label">Reviews</div>
      <div class="dash-value" id="dash-reviews">--</div>
      <span class="dash-chip ok" id="dash-behavior-chip">behavior: --</span>
    </div>
    <div class="dash-card">
      <div class="dash-label">Top Category</div>
      <div class="dash-value" id="dash-top-category">--</div>
      <span class="dash-chip ok" id="dash-products-chip">products: --</span>
    </div>
  </div>
</section>
